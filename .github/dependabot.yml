version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci: "

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(deps): "

    allow:
      - dependency-type: direct

    ignore:
      - dependency-name: "@patternfly/*"
        update-types: [ "version-update:semver-major" ]

    groups:
      patternfly:
        patterns:
          - "@patternfly/*"

      "server dependencies":
        patterns:
          - cookie
          - ejs
          - express
          - http-proxy-middleware
          - http-terminator

      rollup:
        patterns:
          - "@rollup/*"
          - "rollup"
          - "rollup-*"

      linting-formatting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint-*"
          - "@eslint/*"
          - "*-eslint"
          - "prettier"

      tools:
        patterns:
          - "vite"
          - "vite-*"
          - "vitest"
          - "@vitest/*"
          - "@hey-api/*"
