name: Auto-merge openapi PRs

on:
  pull_request_target:
    types: [ opened, synchronize ]
    branches:
      - main
      - "release/*"

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: auto-merge-openapi-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Check if only the OpenAPI spec changed
  check-files:
    runs-on: ubuntu-latest
    if: github.actor == 'trustify-ci-bot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      auto_merge: ${{ steps.check-files.outputs.auto_merge }}
    steps:
      - name: Check changed files
        id: check-files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          files=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json files --jq '.files[].path')

          if [ "$files" != "client/openapi/trustd.yaml" ]; then
            echo "::notice::PR changes files beyond client/openapi/trustd.yaml — manual review required"
            echo "$files"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Only client/openapi/trustd.yaml changed."
          echo "auto_merge=true" >> "$GITHUB_OUTPUT"

  # Determine server branch from PR target branch
  discover-envs:
    needs: check-files
    if: needs.check-files.outputs.auto_merge == 'true'
    runs-on: ubuntu-latest
    outputs:
      server_branch: ${{ steps.set-outputs.outputs.server_branch }}
    steps:
      - name: Extract server branch from PR target
        id: set-outputs
        env:
          base_ref: ${{ github.event.pull_request.base.ref }}
        run: |
          branch=$(echo "${base_ref#refs/heads/}")
          echo "server_branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Server branch: $branch"

  # Build UI image and upload as artifact
  build-ui:
    needs: discover-envs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build and save trustify-ui image
        run: |
          docker build . -t ghcr.io/guacsec/trustify-ui:pr-test -f Dockerfile
          docker save -o /tmp/trustify-ui.tar ghcr.io/guacsec/trustify-ui:pr-test

      - name: Upload trustify-ui image as artifact
        uses: actions/upload-artifact@v7
        with:
          name: trustify-ui
          path: /tmp/trustify-ui.tar
          retention-days: 1

  # Build server image from Dockerfile.server and upload as artifact
  build-server:
    needs: discover-envs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build and save trustd server image
        run: |
          docker build . -t ghcr.io/guacsec/trustd:pr-test -f Dockerfile.server \
            --build-arg server_branch=${{ needs.discover-envs.outputs.server_branch }}
          docker save -o /tmp/trustd.tar ghcr.io/guacsec/trustd:pr-test

      - name: Upload trustd image as artifact
        uses: actions/upload-artifact@v7
        with:
          name: trustd
          path: /tmp/trustd.tar
          retention-days: 1

  # Run e2e tests with both locally-built images
  e2e-tests:
    needs: [ build-ui, build-server ]
    runs-on: ubuntu-latest
    steps:
      - name: Download trustify-ui artifact
        uses: actions/download-artifact@v8
        with:
          name: trustify-ui
          path: /tmp
      - name: Load trustify-ui image
        run: docker load --input /tmp/trustify-ui.tar

      - name: Download trustd artifact
        uses: actions/download-artifact@v8
        with:
          name: trustd
          path: /tmp
      - name: Load trustd image
        run: docker load --input /tmp/trustd.tar

      - name: Checkout ui repo
        uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci --verbose --ignore-scripts --no-audit

      - name: Start trustify
        uses: ./.github/actions/start-trustify
        with:
          ui_image: ghcr.io/guacsec/trustify-ui:pr-test
          server_image: ghcr.io/guacsec/trustd:pr-test

      - name: Run Playwright tests
        run: |
          PW_TEST_CONNECT_WS_ENDPOINT=ws://localhost:5000/ TRUSTIFY_UI_URL=http://localhost:8081 AUTH_REQUIRED=false npm run -w e2e test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            e2e/test-results
            e2e/playwright-report

  # Approve and auto-merge only after e2e tests pass
  approve-and-merge:
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.BOT_APPROVE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr review "$PR_NUMBER" --repo "${{ github.repository }}" --approve \
            --body "$(cat <<'EOF'
          🤖 **Auto-approved**

          Only `client/openapi/trustd.yaml` changed — no manual review required.
          EOF
          )"

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.BOT_APPROVE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ "$BASE_REF" = "main" ]; then
            gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --auto
          else
            gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --squash
          fi
