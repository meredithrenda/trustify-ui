name: CI (repo level)

# Callable only — push/PR CI disabled on this fork (GitHub Pages deploy is separate).
on:
  workflow_dispatch:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Verify package-lock.json
        run: ./scripts/verify_lock.mjs
      - name: Install dependencies
        run: npm ci --verbose --ignore-scripts --no-audit
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test -- --coverage
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run format
      - name: Crate Format
        working-directory: ./crate
        run: cargo fmt --check
      - name: Crate Check
        working-directory: ./crate
        run: cargo check
      - name: Crate Clippy
        working-directory: ./crate
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Crate Test
        working-directory: ./crate
        run: cargo test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          flags: unit
          slug: ${{ github.repository_owner }}/trustify-ui
          directory: client/coverage
